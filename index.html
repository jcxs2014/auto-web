<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>auto-web · 自动生成网页索引</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#3b7df0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="auto-web">
<style>
  :root{
    --bg:#f4f7fb; --bg-2:#ffffff; --bg-3:#eef2f8;
    --card:#ffffff; --card-hover:#f3f6fb;
    --border:#e2e7f0; --border-2:#cfd8e6;
    --text:#16202e; --text-dim:#5a6478; --text-faint:#8590a3;
    --accent:#3b7df0; --accent-2:#6a4cf0; --accent-3:#0c9e8b;
    --radius:16px;
    --accent-soft:rgba(59,125,240,0.10);
    --accent-soft-border:rgba(59,125,240,0.28);
    --accent3-soft:rgba(12,158,139,0.10);
    --accent3-soft-border:rgba(12,158,139,0.26);
  }
  :root[data-theme="dark"]{
    --bg:#0d1117; --bg-2:#161b22; --bg-3:#1c2330;
    --card:#161b22; --card-hover:#1b2230;
    --border:#2a3340; --border-2:#36415a;
    --text:#e6edf3; --text-dim:#9aa7b4; --text-faint:#6b7686;
    --accent:#6ea8ff; --accent-2:#8b7bff; --accent-3:#4fd1c5;
    --radius:16px;
    --accent-soft:rgba(110,168,255,0.06);
    --accent-soft-border:#36415a;
    --accent3-soft:rgba(79,209,197,0.10);
    --accent3-soft-border:rgba(79,209,197,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 15% -10%,rgba(110,168,255,.10),transparent 60%),
               radial-gradient(1000px 500px at 90% 0%,rgba(139,123,255,.10),transparent 55%),
               var(--bg);
    color:var(--text); min-height:100vh; line-height:1.6; padding:0 max(20px,env(safe-area-inset-left)) 60px max(20px,env(safe-area-inset-right));
  }
  .wrap{max-width:1100px;margin:0 auto}

  /* Hero */
  .hero{padding:64px 8px 40px;text-align:center}
  .hero .kicker{
    display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.12em;
    color:var(--accent);text-transform:uppercase;font-weight:600;
    border:1px solid var(--border-2);border-radius:999px;padding:6px 16px;margin-bottom:22px;
    background:var(--accent-soft);
  }
  .hero h1{
    font-size:clamp(30px,5vw,46px);font-weight:800;letter-spacing:-.02em;line-height:1.15;
    background:linear-gradient(120deg,var(--text) 30%,var(--accent) 75%,var(--accent-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .hero p{color:var(--text-dim);font-size:16px;margin-top:14px;max-width:620px;margin-left:auto;margin-right:auto}
  .stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
  .stat{
    background:var(--bg-2);border:1px solid var(--border);border-radius:14px;
    padding:14px 22px;min-width:120px;
  }
  .stat b{display:block;font-size:26px;font-weight:800;color:var(--text)}
  .stat span{font-size:12px;color:var(--text-faint);letter-spacing:.04em}

  /* Section title */
  .sec-title{display:flex;align-items:center;gap:12px;margin:46px 4px 22px}
  .sec-title h2{font-size:20px;font-weight:700}
  .sec-title .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-2),transparent)}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
  .card{
    position:relative;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;display:flex;flex-direction:column;gap:14px;overflow:hidden;
    transition:transform .18s ease,border-color .18s ease,background .18s ease;
  }
  .card::before{
    content:"";position:absolute;inset:0 0 auto 0;height:3px;
    background:linear-gradient(90deg,var(--c1,var(--accent)),var(--c2,var(--accent-2)));
    opacity:.9;
  }
  .card:hover{transform:translateY(-4px);border-color:var(--border-2);background:var(--card-hover)}
  .card-top{display:flex;align-items:center;gap:14px}
  .card-icon{
    width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px;
    background:linear-gradient(135deg,var(--accent-soft),var(--accent-soft));
    border:1px solid var(--border-2);flex:none;
  }
  .card h3{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .chip{
    display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;
    color:var(--accent-3);background:var(--accent3-soft);border:1px solid var(--accent3-soft-border);
    border-radius:999px;padding:3px 10px;margin-top:4px;
  }
  .card p.desc{color:var(--text-dim);font-size:14px;flex:1}
  .meta{display:flex;gap:16px;font-size:12px;color:var(--text-faint);border-top:1px solid var(--border);padding-top:12px}
  .meta b{color:var(--text-dim);font-weight:600}
  .links{display:flex;gap:10px;margin-top:4px}
  .btn{
    flex:1;text-align:center;text-decoration:none;font-size:14px;font-weight:600;
    padding:10px 14px;border-radius:10px;transition:all .15s ease;
  }
  .btn-primary{color:#0d1117;background:linear-gradient(120deg,var(--accent),var(--accent-2));border:none}
  .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .btn-ghost{color:var(--text-dim);background:var(--bg-3);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--border-2)}
  .btn-disabled{color:var(--text-faint);background:var(--bg-3);border:1px solid var(--border);cursor:not-allowed;opacity:.72}
  .btn-disabled:hover{color:var(--text-faint);border-color:var(--border);transform:none}

  .theme-toggle{
    position:fixed;top:16px;right:18px;z-index:100;
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;
    color:var(--text);background:var(--card);border:1px solid var(--border-2);
    box-shadow:var(--shadow);cursor:pointer;transition:all .15s ease;
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

  .empty{
    grid-column:1/-1;text-align:center;color:var(--text-faint);
    border:1px dashed var(--border-2);border-radius:var(--radius);padding:48px 20px;
  }

  footer{
    text-align:center;color:var(--text-faint);font-size:12.5px;margin-top:54px;line-height:1.8;
  }
  footer a{color:var(--accent);text-decoration:none}
  footer a:hover{text-decoration:underline}

  @media (max-width:640px){
    body{padding:0 14px 48px}
    .hero{padding:44px 4px 28px}
    .grid{grid-template-columns:1fr}
    .card{padding:20px 18px}
    .card-icon{width:46px;height:46px;font-size:23px}
    .stat{padding:12px 16px;min-width:96px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}

  /* Weather card — 场景化动态天空（参考 Aether 风格，单卡片显示当前城市） */
  .weather-wrap{max-width:440px;margin:0 auto 10px;padding:0 4px}
  .weather-cities{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
  .weather-city{
    font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;
    background:var(--bg-3);border:1px solid var(--border);color:var(--text-dim);
    cursor:pointer;transition:all .15s ease;white-space:nowrap;font-family:inherit;
  }
  .weather-city:hover{border-color:var(--border-2);color:var(--text)}
  .weather-city.active{background:var(--accent-soft);border-color:var(--accent-soft-border);color:var(--accent)}
  .wx-card{
    position:relative;height:230px;border-radius:24px;overflow:hidden;
    box-shadow:0 10px 30px -12px rgba(52,67,94,.35);
    transition:transform .35s cubic-bezier(.2,.8,.25,1),box-shadow .35s;
  }
  .wx-card:hover{transform:translateY(-4px);box-shadow:0 22px 50px -18px rgba(52,67,94,.5)}
  .wx-scene{position:absolute;inset:0;overflow:hidden;z-index:0}
  .wx-scene::after{content:"";position:absolute;left:0;right:0;bottom:0;height:62%;background:linear-gradient(to top,rgba(20,30,50,.42),transparent);z-index:1}
  .wx-info{position:absolute;left:0;right:0;bottom:0;padding:16px 20px 18px;z-index:2}
  .wx-names{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .wx-cn{font-size:21px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.35)}
  .wx-en{font-size:12.5px;letter-spacing:.6px;color:rgba(255,255,255,.85)}
  .wx-row1{display:flex;align-items:flex-end;justify-content:space-between;margin-top:6px}
  .wx-temp{font-weight:800;font-size:46px;line-height:.9;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3);letter-spacing:-.02em}
  .wx-temp small{font-size:20px;font-weight:700;vertical-align:top}
  .wx-cond{font-weight:600;font-size:14px;color:#fff;text-align:right;text-shadow:0 1px 4px rgba(0,0,0,.35)}
  .wx-meta{margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.92)}
  .wx-meta span{display:inline-flex;align-items:center;gap:4px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
  .wx-meta b{font-weight:700}
  .wx-loading,.wx-err{position:absolute;inset:0;display:grid;place-items:center;z-index:2;padding:24px;text-align:center}
  .wx-loading{color:rgba(255,255,255,.92);font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
  .wx-err{color:#ffd6d6;font-size:13px;line-height:1.7;text-shadow:0 1px 4px rgba(0,0,0,.4)}
  .wx-err code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(0,0,0,.28);padding:1px 5px;border-radius:4px;font-size:12px;color:#fff}
  /* 七套天空底色 */
  .sky-sunny{background:linear-gradient(180deg,#bfe6ff 0%,#e8f6ff 100%)}
  .sky-cloudy{background:linear-gradient(180deg,#c4d2e2 0%,#eef2f6 100%)}
  .sky-rain{background:linear-gradient(180deg,#9bb1c6 0%,#cdd9e4 100%)}
  .sky-snow{background:linear-gradient(180deg,#dde5f3 0%,#f4f1fb 100%)}
  .sky-thunder{background:linear-gradient(180deg,#525b73 0%,#7e87a0 100%)}
  .sky-fog{background:linear-gradient(180deg,#dde3e6 0%,#eef1f2 100%)}
  .sky-night{background:linear-gradient(180deg,#2a2f5e 0%,#4b4f88 100%)}
  /* 太阳 */
  .sun{position:absolute;top:14%;left:16%;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#fff7c4,#ffd86b);box-shadow:0 0 34px 10px rgba(255,216,107,.6);animation:sunpulse 4s ease-in-out infinite}
  @keyframes sunpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  /* 云 */
  .cloud{position:absolute;width:74px;height:26px;background:var(--cld,#fff);border-radius:22px;opacity:.95;transform:scale(var(--sc,1));animation:drift var(--dur,22s) linear var(--delay,0s) infinite;filter:drop-shadow(0 6px 8px rgba(80,100,130,.12))}
  .cloud::before{content:"";position:absolute;width:32px;height:32px;background:var(--cld,#fff);border-radius:50%;top:-14px;left:12px}
  .cloud::after{content:"";position:absolute;width:24px;height:24px;background:var(--cld,#fff);border-radius:50%;top:-9px;left:40px}
  @keyframes drift{from{left:-22%}to{left:112%}}
  /* 雨 */
  .raindrop{position:absolute;top:-12%;width:2px;height:15px;background:linear-gradient(transparent,rgba(190,210,235,.85));border-radius:2px;animation:fall var(--fdur,1s) linear var(--fdelay,0s) infinite}
  @keyframes fall{0%{transform:translateY(-10px);opacity:0}12%{opacity:1}100%{transform:translateY(240px);opacity:.15}}
  /* 雪 */
  .snowflake{position:absolute;top:-6%;width:7px;height:7px;background:#fff;border-radius:50%;opacity:.9;box-shadow:0 0 6px rgba(255,255,255,.8);animation:snowfall var(--sdur,6s) linear var(--sdelay,0s) infinite}
  @keyframes snowfall{0%{transform:translateY(-10px) translateX(0);opacity:0}10%{opacity:1}100%{transform:translateY(250px) translateX(26px);opacity:.2}}
  /* 雷暴 */
  .flash{position:absolute;inset:0;background:transparent;animation:flash var(--ldur,5s) linear var(--ldelay,0s) infinite}
  .bolt{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:26px;height:38px;opacity:0;animation:bolt var(--ldur,5s) linear var(--ldelay,0s) infinite;filter:drop-shadow(0 0 8px rgba(255,240,150,.9))}
  @keyframes flash{0%,90%,100%{background:transparent}91%{background:rgba(255,255,255,.55)}93%{background:transparent}95%{background:rgba(255,255,255,.4)}97%{background:transparent}}
  @keyframes bolt{0%,90%,100%{opacity:0}91%{opacity:1}93%{opacity:0}95%{opacity:.9}97%{opacity:0}}
  /* 雾 */
  .fogband{position:absolute;left:-15%;width:130%;height:34px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);filter:blur(7px);animation:fogmove var(--gdur,9s) ease-in-out var(--gdelay,0s) infinite alternate}
  @keyframes fogmove{from{transform:translateX(-9%)}to{transform:translateX(9%)}}
  /* 月 + 星 */
  .moon{position:absolute;top:13%;right:15%;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 36% 34%,#fffbe8,#ffe49f);box-shadow:0 0 26px 7px rgba(255,228,159,.5);animation:moonpulse 5s ease-in-out infinite}
  @keyframes moonpulse{0%,100%{box-shadow:0 0 22px 6px rgba(255,228,159,.45)}50%{box-shadow:0 0 34px 10px rgba(255,228,159,.6)}}
  .star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;animation:twinkle var(--tdur,3s) ease-in-out var(--tdelay,0s) infinite}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
  @media(max-width:640px){
    .weather-wrap{max-width:none}
    .wx-card{height:200px}
    .wx-temp{font-size:40px}
  }
  @media (prefers-reduced-motion:reduce){.sun,.cloud,.raindrop,.snowflake,.flash,.bolt,.fogband,.moon,.star{animation:none!important}}
</style>
<script>
  (function(){try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();
</script>
</head>
<body>
<button id="theme-toggle" class="theme-toggle" type="button">🌙 暗色</button>
<div class="wrap">

  <header class="hero">
    <div class="kicker">⚡ AUTO-WEB</div>
    <h1>自动生成网页索引</h1>
    <p>每日定时拉取并生成的资讯 / 论文仪表盘，集中在此入口。点开任意卡片即可查看当日最新内容。</p>
    <div class="stats" id="stats"></div>
  </header>

  <section class="weather-wrap" id="weatherWrap" aria-label="天气">
    <div class="weather-cities" id="weatherCities"></div>
    <article class="wx-card sky-cloudy" id="wxCard">
      <div class="wx-scene" id="wxScene"></div>
      <div class="wx-loading" id="wxLoading">天气加载中…</div>
      <div class="wx-info" id="wxInfo" style="display:none">
        <div class="wx-names"><span class="wx-cn" id="wxCn"></span><span class="wx-en" id="wxEn"></span></div>
        <div class="wx-row1">
          <div class="wx-temp" id="wxTemp"></div>
          <div class="wx-cond" id="wxCond"></div>
        </div>
        <div class="wx-meta" id="wxMeta"></div>
      </div>
    </article>
  </section>

  <div class="sec-title">
    <h2>📂 仪表盘</h2>
    <div class="line"></div>
  </div>

  <main class="grid" id="grid"></main>

  <footer>
    本页为 <strong>auto-web</strong> 自动生成内容的统一入口 · 数据由每日定时任务刷新<br>
    新增主题只需在页面脚本的 <code>DASHBOARDS</code> 数组中追加一项即可
  </footer>

</div>

<script>
/* =========================================================================
 *  DASHBOARDS —— 仪表盘清单（单一数据源，新增主题只需在此数组追加一个对象）
 *  字段说明：
 *    key      唯一标识（英文，用作锚点）
 *    title    显示标题
 *    icon     卡片图标 emoji
 *    tag      分类标签（小徽标）
 *    desc     一句话描述
 *    latest   稳定书签路径（每日覆盖的最新版）
 *    archive  历史归档目录（含 dated 副本）
 *    updated  最近生成日期（YYYY-MM-DD，由 generators/gen_dashboard_index.py 自动维护，
 *             每次 CI 运行时从各仪表盘产物中读取，无需手填）
 *    scale    规模说明，如 "12 条/日" / "60 篇/日"
 *    c1, c2   卡片顶部渐变条颜色（可选，默认蓝紫）
 * ========================================================================= */
const DASHBOARDS = [
  {
    key: "aihot",
    title: "AI HOT 每日科技日报",
    icon: "📰",
    tag: "科技资讯",
    desc: "AI HOT 每日精选 5 大版块科技动态：模型发布/更新、产品发布/更新、行业动态、论文研究、技巧与观点。",
    latest: "aihot/aihot_daily_latest.html",
    archive: "aihot/archive.html",
    updated: "2026-07-19",
    scale: "12 条 / 日",
    c1: "#6ea8ff", c2: "#8b7bff"
  },
  {
    key: "arxiv-physics",
    title: "arXiv 物理最新论文",
    icon: "🔭",
    tag: "学术论文",
    desc: "高能 / 空间 / 引力 / 天体 / 探测器 5 主题最新预印本，含自动中文翻译与 LaTeX 公式渲染。",
    latest: "arxiv-physics/arxiv_physics_latest.html",
    archive: "arxiv-physics/archive.html",
    updated: "2026-07-19",
    scale: "60 篇 / 日",
    c1: "#a78bfa", c2: "#6ea8ff"
  }
  ,{
    key: "hotnews",
    title: "综合中文热点",
    icon: "🔥",
    tag: "实时热点",
    desc: "聚合百度/微博/头条/B站 热搜榜 + 国际热点（已翻译）+ 官方新闻（中新网，可展开详情），按平台分区排名。",
    latest: "hotnews/index.html",
    archive: "hotnews/archive.html",
    updated: "2026-07-20",
    scale: "165 条 / 日",
    c1: "#ff5c6a", c2: "#ff9f43"
  }
  ,{
    key: "news",
    title: "全球新闻",
    icon: "📰",
    tag: "中/意/欧/国际",
    desc: "聚合中国新闻网 + 意大利（共和报/24小时太阳报）+ 法国（France24）+ 欧盟（Politico/EU·Google News）+ 英国（BBC/卫报）+ 美国（纽约时报/华盛顿邮报）+ 日本（NHK）+ 卡塔尔（半岛电视台），标题同步翻译中文，可展开详情。",
    latest: "news/index.html",
    archive: "news/archive.html",
    updated: "2026-07-20",
    scale: "130 条 / 日",
    c1: "#4fd1c5", c2: "#6ea8ff"
  }
  ,{
    key: "rss",
    title: "RSS 阅读",
    icon: "📡",
    tag: "自定义订阅",
    desc: "自动拉取你配置在 rss/feeds.json 的 RSS 订阅，每个来源保留最新 10 篇，统一排版、可按分类筛选，旧文自动淘汰。",
    latest: "rss/index.html",
    archive: "",   // 空 = 不归档（渲染为禁用按钮「不归档」，不跳转）
    updated: "2026-07-19",
    scale: "每源 10 篇",
    c1: "#1d8fe1", c2: "#7b61ff"
  }
  /* 例：新增一个主题只需复制下面这段并改字段
  ,{
    key: "my-topic",
    title: "我的新主题",
    icon: "🌟",
    tag: "分类",
    desc: "一句话描述。",
    latest: "my-topic/latest.html",
    archive: "my-topic/",
    updated: "2026-07-19",
    scale: "N 条 / 日",
    c1: "#4fd1c5", c2: "#6ea8ff"
  }
  */
];

(function render(){
  const grid = document.getElementById("grid");
  const stats = document.getElementById("stats");

  // 统计条
  stats.innerHTML = `
    <div class="stat"><b>${DASHBOARDS.length}</b><span>仪表盘数量</span></div>
    <div class="stat"><b>每日</b><span>自动刷新</span></div>
    <div class="stat"><b>纯静态</b><span>无外部依赖</span></div>
  `;

  if(!DASHBOARDS.length){
    grid.innerHTML = `<div class="empty">暂无仪表盘 —— 在脚本的 DASHBOARDS 数组中添加一项即可。</div>`;
    return;
  }

  grid.innerHTML = DASHBOARDS.map(d => `
    <article class="card" id="${d.key}" style="--c1:${d.c1||'#6ea8ff'};--c2:${d.c2||'#8b7bff'}">
      <div class="card-top">
        <div class="card-icon">${d.icon}</div>
        <div>
          <h3>${d.title}</h3>
          <span class="chip">${d.tag}</span>
        </div>
      </div>
      <p class="desc">${d.desc}</p>
      <div class="meta">
        <span>更新 <b>${d.updated}</b></span>
        <span>规模 <b>${d.scale}</b></span>
      </div>
      <div class="links">
        <a class="btn btn-primary" href="${d.latest}" target="_blank" rel="noopener noreferrer">打开仪表盘 →</a>
        ${d.archive
          ? `<a class="btn btn-ghost" href="${d.archive}" target="_blank" rel="noopener noreferrer">历史归档</a>`
          : `<span class="btn btn-ghost btn-disabled" title="RSS 为实时订阅，仅保留每源最新内容、旧文自动淘汰，不留存历史归档">不归档</span>`}
      </div>
    </article>
  `).join("");
})();
</script>
<script>
/* 天气卡片：Open-Meteo（免费、免 key、CORS 友好），场景化动态天空，6 城市可切换，localStorage 记忆 */
(function(){
  var CITIES=[
    {n:'佩鲁贾',en:'Perugia',lat:43.1122,lon:12.3888},
    {n:'北京',en:'Beijing',lat:39.9042,lon:116.4074},
    {n:'合肥',en:'Hefei',lat:31.8206,lon:117.2272},
    {n:'广州',en:'Guangzhou',lat:23.1291,lon:113.2644},
    {n:'榆林',en:'Yulin',lat:38.2854,lon:109.7348},
    {n:'南昌',en:'Nanchang',lat:28.6820,lon:115.8579}
  ];
  // WMO weather_code → [场景, 中文标签]；isDay=0 时晴/晴间多云走 night 场景
  function wmoToScene(code,isDay){
    var c=code|0;
    if(c===0) return isDay?['sunny','晴朗']:['night','晴夜'];
    if(c<=2) return isDay?['cloudy','晴间多云']:['night','晴夜'];
    if(c===3) return ['cloudy','阴'];
    if(c===45||c===48) return ['fog','雾'];
    if(c>=51&&c<=57) return ['rain','毛毛雨'];
    if(c>=61&&c<=67) return ['rain','雨'];
    if(c>=71&&c<=77) return ['snow','雪'];
    if(c===80||c===81) return ['rain','阵雨'];
    if(c===82) return ['rain','强阵雨'];
    if(c===85||c===86) return ['snow','阵雪'];
    if(c>=95) return ['thunder','雷阵雨'];
    return isDay?['cloudy','多云']:['night','晴夜'];
  }
  var KEY='weather-city-idx';
  var idx=0;
  try{var s=parseInt(localStorage.getItem(KEY));if(!isNaN(s)&&s>=0&&s<CITIES.length)idx=s;}catch(e){}
  var citiesEl=document.getElementById('weatherCities');
  var sceneEl=document.getElementById('wxScene');
  var loadingEl=document.getElementById('wxLoading');
  var infoEl=document.getElementById('wxInfo');
  var cnEl=document.getElementById('wxCn');
  var enEl=document.getElementById('wxEn');
  var tempEl=document.getElementById('wxTemp');
  var condEl=document.getElementById('wxCond');
  var metaEl=document.getElementById('wxMeta');
  var cardEl=document.getElementById('wxCard');
  if(!citiesEl||!cardEl)return;
  function rnd(a,b){return a+Math.random()*(b-a);}
  function cloudHTML(n,dark){
    var bands=[16,38,60],s='';
    for(var i=0;i<n;i++){
      var top=bands[i%bands.length],dur=rnd(20,34)+i*2,delay=-rnd(0,dur),sc=rnd(0.7,1.25),left=rnd(0,70);
      var c=dark?'#6b7186':'#ffffff';
      s+='<div class="cloud" style="top:'+top+'%;left:'+left+'%;--dur:'+dur+'s;--delay:'+delay+'s;--sc:'+sc+';--cld:'+c+'"></div>';
    }
    return s;
  }
  function rainHTML(n){var s='';for(var i=0;i<n;i++){var left=rnd(2,98),fdur=rnd(0.7,1.3),fdelay=-rnd(0,fdur);s+='<div class="raindrop" style="left:'+left+'%;--fdur:'+fdur+'s;--fdelay:'+fdelay+'s"></div>';}return s;}
  function snowHTML(n){var s='';for(var i=0;i<n;i++){var left=rnd(2,98),sdur=rnd(5,9),sdelay=-rnd(0,sdur),sz=rnd(4,9);s+='<div class="snowflake" style="left:'+left+'%;width:'+sz+'px;height:'+sz+'px;--sdur:'+sdur+'s;--sdelay:'+sdelay+'s"></div>';}return s;}
  function starsHTML(n){var s='';for(var i=0;i<n;i++){var top=rnd(6,70),left=rnd(4,94),tdur=rnd(2,4.5),tdelay=-rnd(0,tdur),sz=rnd(2,4);s+='<div class="star" style="top:'+top+'%;left:'+left+'%;width:'+sz+'px;height:'+sz+'px;--tdur:'+tdur+'s;--tdelay:'+tdelay+'s"></div>';}return s;}
  function fogHTML(){var s='';[22,46,70].forEach(function(tp,i){var gdur=rnd(8,12),gdelay=-rnd(0,gdur);s+='<div class="fogband" style="top:'+tp+'%;--gdur:'+gdur+'s;--gdelay:'+gdelay+'s"></div>';});return s;}
  function thunderHTML(){var ldur=rnd(4,7),ldelay=-rnd(0,ldur);var bolt='<svg class="bolt" viewBox="0 0 24 34"><polygon points="13,0 4,19 12,19 8,34 21,12 13,12" fill="#fff3a8"/></svg>';return '<div class="flash" style="--ldur:'+ldur+'s;--ldelay:'+ldelay+'s"></div><div style="--ldur:'+ldur+'s;--ldelay:'+ldelay+'s;position:absolute;inset:0">'+bolt+'</div>';}
  function buildScene(w){
    switch(w){
      case 'sunny':return '<div class="sun"></div>'+cloudHTML(2,false);
      case 'cloudy':return cloudHTML(4,false);
      case 'rain':return cloudHTML(2,false)+rainHTML(22);
      case 'snow':return cloudHTML(2,false)+snowHTML(20);
      case 'thunder':return cloudHTML(4,true)+thunderHTML()+rainHTML(16);
      case 'fog':return cloudHTML(2,false)+fogHTML();
      case 'night':return '<div class="moon"></div>'+starsHTML(18);
      default:return '';
    }
  }
  function renderCities(){
    citiesEl.innerHTML=CITIES.map(function(c,i){return '<button type="button" class="weather-city'+(i===idx?' active':'')+'" data-i="'+i+'">'+c.n+'</button>';}).join('');
    Array.prototype.forEach.call(citiesEl.querySelectorAll('.weather-city'),function(b){
      b.addEventListener('click',function(){
        idx=parseInt(b.getAttribute('data-i'));
        try{localStorage.setItem(KEY,String(idx));}catch(e){}
        renderCities();load();
      });
    });
  }
  function showState(msg,isErr){
    loadingEl.className=isErr?'wx-err':'wx-loading';
    loadingEl.innerHTML=msg;
    loadingEl.style.display='grid';
    infoEl.style.display='none';
    sceneEl.innerHTML='';
    cardEl.className='wx-card sky-cloudy';
  }
  function sign(v){return (v<0?'−':'')+Math.abs(v);}
  function load(){
    var c=CITIES[idx];
    if(location.protocol==='file:'){
      showState('本地文件（file://）模式下浏览器禁止联网 fetch，天气无法加载。<br>请访问线上站点，或用本地服务器打开：在项目目录执行 <code>python3 -m http.server</code> 后访问 <code>localhost:8000</code>。',true);
      return;
    }
    showState('「'+c.n+'」天气加载中…',false);
    var url='https://api.open-meteo.com/v1/forecast?latitude='+c.lat+'&longitude='+c.lon+
      '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,is_day'+
      '&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1';
    fetch(url).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      var cur=d.current||{},dn=d.daily||{};
      var sc=wmoToScene(cur.weather_code,cur.is_day!==0);
      var t=Math.round(cur.temperature_2m),feel=Math.round(cur.apparent_temperature);
      var hi=dn.temperature_2m_max?Math.round(dn.temperature_2m_max[0]):null;
      var lo=dn.temperature_2m_min?Math.round(dn.temperature_2m_min[0]):null;
      sceneEl.innerHTML=buildScene(sc[0]);
      cardEl.className='wx-card sky-'+sc[0];
      cnEl.textContent=c.n;enEl.textContent=c.en;
      tempEl.innerHTML=sign(t)+'<small>°</small>';
      condEl.textContent=sc[1];
      var range=(hi!==null&&lo!==null)?'<span>↑ <b>'+sign(hi)+'°</b> &nbsp; ↓ <b>'+sign(lo)+'°</b></span>':'';
      metaEl.innerHTML='<span>体感 <b>'+sign(feel)+'°</b></span><span>湿度 <b>'+cur.relative_humidity_2m+'%</b></span><span>风 <b>'+Math.round(cur.wind_speed_10m)+'</b> km/h</span>'+range;
      loadingEl.style.display='none';infoEl.style.display='block';
    }).catch(function(e){
      showState('「'+c.n+'」天气加载失败：'+e.message+'<br>（Open-Meteo 可能不可达）',true);
    });
  }
  renderCities();load();
  setInterval(load,600000); // 每 10 分钟刷新
})();
</script>
<script>
  (function(){
    var btn=document.getElementById('theme-toggle');
    if(!btn)return;
    function sync(){var dark=document.documentElement.getAttribute('data-theme')==='dark';btn.innerHTML=dark?'☀️ 亮色':'🌙 暗色';}
    sync();
    btn.addEventListener('click',function(){
      var dark=document.documentElement.getAttribute('data-theme')==='dark';
      var next=dark?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      try{localStorage.setItem('theme',next);}catch(e){}
      sync();
    });
  })();
</script>
