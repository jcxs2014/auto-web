name: Hot update

# 综合中文热点（hot）：百度热搜 / 微博热搜 / 今日头条热榜 / 国际热点
# 热榜为分钟级变化，从原 hotnews.yml 拆出独立 workflow，提高到每 2 小时一次
# 每天意大利（CEST, UTC+2）00:03 / 02:03 / ... / 22:03 各跑一次（偶数整点，分钟错峰）
on:
  schedule:
    - cron: "3 */2 * * *"
  workflow_dispatch:  # 允许在 Actions 标签手动触发一次

# 允许 GITHUB_TOKEN 把生成结果推送回仓库
permissions:
  contents: write

jobs:
  hot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      # 生成前先拉取最新代码，避免在本旧提交上生成导致与后续 push 冲突
      - name: Pull latest before generate
        run: git pull --rebase origin main || true

      - name: Generate 综合中文热点
        run: |
          cd generators
          python gen_hotnews.py hot
          cd ..

      - name: Commit and push (hot)
        run: bash sync.sh hot hotnews
