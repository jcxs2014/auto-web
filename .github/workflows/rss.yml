name: RSS update

# 每个订阅源只保留最近 7 天文章，且希望内容尽量新鲜 → 高频更新（每 6 小时一次）
# 对应意大利（CEST, UTC+2）02:00 / 08:00 / 14:00 / 20:00
# GitHub 免费层 scheduled run 可能延迟数分钟~数小时，属正常。
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:  # 允许在 Actions 标签手动触发一次

# 允许 GITHUB_TOKEN 把生成结果推送回仓库
permissions:
  contents: write

jobs:
  rss:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      - name: Generate RSS reader
        run: |
          cd generators
          python gen_rss_reader.py
          cd ..

      - name: Commit and push (rss)
        run: bash sync.sh rss
