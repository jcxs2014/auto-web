name: Hotnews update

# 综合中文热点(hot) + 全球新闻(news)，由同一生成器脚本分两次调用
# 每天意大利（CEST, UTC+2）06:05 / 12:05 / 18:05 各跑一次（分钟错峰，降低与其它模块并发 push 冲突）
on:
  schedule:
    - cron: "5 4,10,16 * * *"
  workflow_dispatch:  # 允许在 Actions 标签手动触发一次

# 允许 GITHUB_TOKEN 把生成结果推送回仓库
permissions:
  contents: write

jobs:
  hotnews:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      - name: Generate 综合热点 + 全球新闻
        run: |
          cd generators
          python gen_hotnews.py hot
          python gen_hotnews.py news
          cd ..

      - name: Commit and push (hotnews)
        run: bash sync.sh hotnews
