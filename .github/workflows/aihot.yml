name: AIHOT update

# AI HOT 每日科技日报
# 每天意大利（CEST, UTC+2）07:10 / 13:10 / 19:10 各跑一次（分钟错峰，降低与其它模块并发 push 冲突）
on:
  schedule:
    - cron: "10 5,11,17 * * *"
  workflow_dispatch:  # 允许在 Actions 标签手动触发一次

# 允许 GITHUB_TOKEN 把生成结果推送回仓库
permissions:
  contents: write

jobs:
  aihot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      # 生成前先拉取最新代码，避免在本旧提交上生成导致与后续 push 冲突
      - name: Pull latest before generate
        run: git pull --rebase origin main || true

      - name: Generate AI HOT daily
        run: |
          cd generators
          python gen_aihot_daily.py
          cd ..

      - name: Commit and push (aihot)
        run: bash sync.sh aihot
