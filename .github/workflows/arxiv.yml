name: arXiv update

# arXiv 物理最新论文
# 每天意大利（CEST, UTC+2）08:15 / 14:15 / 20:15 各跑一次（分钟错峰，降低与其它模块并发 push 冲突）
on:
  schedule:
    - cron: "15 6,12,18 * * *"
  workflow_dispatch:  # 允许在 Actions 标签手动触发一次

# 允许 GITHUB_TOKEN 把生成结果推送回仓库
permissions:
  contents: write

jobs:
  arxiv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      # 生成前先拉取最新代码，避免在本旧提交上生成导致与后续 push 冲突
      - name: Pull latest before generate
        run: git pull --rebase origin main || true

      - name: Generate arXiv physics
        run: |
          cd generators
          python gen_arxiv_physics.py
          cd ..

      - name: Commit and push (arxiv)
        run: bash sync.sh arxiv arxiv-physics
