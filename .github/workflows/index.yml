name: Index update

# 根目录索引页（index.html）上的各仪表盘"更新日期"需要跟随产物自动刷新，
# 因此每个子仪表盘生成后，由本 workflow 定期重新生成索引日期。
# 每小时运行一次，覆盖各子仪表盘可能已更新的时间窗口；也支持手动触发。
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

      - name: Pull latest before generate
        run: git pull --rebase origin main || true

      - name: Generate dashboard index
        run: |
          cd generators
          python gen_dashboard_index.py
          cd ..

      - name: Commit and push (index)
        run: bash sync.sh index index.html
