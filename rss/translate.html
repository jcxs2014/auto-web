<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="content-language" content="en">
<title>翻译 · RSS</title>
<style>
  body{font:16px/1.75 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;max-width:760px;margin:0 auto;padding:24px 18px 80px;color:#1a1a1a;background:#fff;word-wrap:break-word}
  .bar{position:sticky;top:0;background:#f3f6fa;border-bottom:1px solid #e3e8ef;padding:10px 14px;font-size:13.5px;color:#555;margin:-24px -18px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
  .bar a{color:#1a6fc4;text-decoration:none}.bar b{color:#111}
  .t-tools{display:inline-flex;align-items:center;gap:8px}
  #google_translate_element{display:inline-block}
  #google_translate_element .goog-te-gadget{font-size:13px!important}
  #google_translate_element .goog-te-gadget-simple{background:#fff;border:1px solid #cbd5e1;border-radius:999px;padding:3px 8px}
  #google_translate_element img{display:none!important}
  .bing{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;border:1px solid #cbd5e1;color:#1a6fc4;font-size:13px}
  .bing:hover{border-color:#1a6fc4}
  .bing.warn{border-color:#d97706;background:#fff7ed;color:#b45309}
  h1{font-size:24px;line-height:1.35;margin:0 0 14px;font-weight:800}
  img{max-width:100%;height:auto;border-radius:8px;margin:1em 0}a{color:#1a6fc4}
  p{margin:0 0 1.1em}blockquote{border-left:3px solid #1a6fc4;margin:1em 0;padding:.3em 1em;color:#444}
  .err{padding:40px 0;color:#c0392b;font-size:15px}
</style>
</head>
<body>
  <div class="bar">
    <span class="t-tools">
      <span id="google_translate_element"></span>
      <a id="bingBtn" class="bing" href="#" onclick="openBingTranslate();return false;" style="display:none" title="用 Bing 翻译正文（国内可用）">🌐 Bing 翻译</a>
    </span>
    <span>来源：<b id="src"></b> · <a id="origin" href="#" target="_blank" rel="noopener noreferrer">查看原文 →</a></span>
  </div>
  <h1 id="title"></h1>
  <div id="article"></div>
<script>
var ARTICLE_TEXT='';
function loadGoogle(){
  if(window.__gLoaded) return;
  window.__gLoaded=true;
  var s=document.createElement('script');
  s.src='https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
  s.async=true;
  document.head.appendChild(s);
}
function googleTranslateElementInit(){
  try{ new google.translate.TranslateElement({
    pageLanguage:'en',
    includedLanguages:'zh-CN,en,ja,fr,de,ko,ru,es,it,pt',
    layout:google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay:false
  },'google_translate_element'); }catch(e){}
  var b=document.getElementById('bingBtn'); if(b) b.style.display='inline-flex';
}
function openBingTranslate(){
  var t=encodeURIComponent(ARTICLE_TEXT.slice(0,8000));
  window.open('https://cn.bing.com/translator?from=en&to=zh-CHS&text='+t,'_blank');
}
(function(){
  var q=new URLSearchParams(location.search);
  var src=q.get('src'), id=q.get('id');
  var titleEl=document.getElementById('title');
  var srcEl=document.getElementById('src');
  var artEl=document.getElementById('article');
  var originEl=document.getElementById('origin');
  if(!src||!id){titleEl.textContent='参数缺失（需要 src 与 id）';return;}
  fetch('data/'+encodeURIComponent(src)+'.json').then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    var entries=d.entries||[];
    var e=null;
    for(var i=0;i<entries.length;i++){ if(entries[i].url===id){e=entries[i];break;} }
    if(!e){titleEl.textContent='未找到该文章（可能已超出近 7 天保留期）';return;}
    document.title=(d.name||'翻译')+' · RSS';
    if(srcEl)srcEl.textContent=d.name||'';
    titleEl.textContent=e.title||'(无标题)';
    if(originEl&&e.url)originEl.href=e.url;
    var html=e.content||e.summary||'(该源未抓取全文，仅有摘要)';
    artEl.innerHTML=html;
    ARTICLE_TEXT=(html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    // 正文就绪后再初始化 Google 翻译，确保整页（含 fetch 注入的英文正文）被纳入翻译范围
    loadGoogle();
    setTimeout(function(){
      if(!document.querySelector('.goog-te-combo')){
        var b=document.getElementById('bingBtn');
        if(b){ b.style.display='inline-flex'; b.classList.add('warn'); b.title='Google 翻译不可用，请改用 Bing 翻译'; }
      }
    },3500);
  }).catch(function(err){
    titleEl.textContent='加载失败：'+err.message;
  });
})();
</script>
</body>
</html>
